version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Stockholm
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      types:
        patterns:
          - "@types/*"
      dev-tooling:
        patterns:
          - vite
          - vitest
          - "@vitejs/*"
          - "@vitest/*"
          - typescript
      runtime:
        patterns:
          - react
          - react-dom
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Stockholm
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
